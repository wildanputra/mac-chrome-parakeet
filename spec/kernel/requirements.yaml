# MacParakeet Requirements
# Optional, compact feature/status index. Stable requirement IDs for
# cross-referencing specs, commits, and ADRs. Not exhaustive and not required
# on every change. (Tests and git are the authoritative coverage/history record;
# the former manual source/test traceability map was retired.)
# Format: REQ-{area}-{number}: {description}
#
# Areas:
#   DICT  - Dictation (system-wide voice input)
#   TRANS - File transcription
#   STT   - Speech-to-text engine
#   UI    - User interface
#   DATA  - Database and data model
#   PIPE  - Text processing pipeline
#   EXP   - Export formats
#   YT    - YouTube integration
#   DIAR  - Speaker diarization
#   LLM   - LLM provider integration
#   PLAY  - Video/audio playback
#   LIB   - Transcription library
#   MEET  - Meeting recording
#   CAL   - Calendar auto-start
#   ONB   - First-run onboarding
#   CLI   - Public command-line surface
#   XFORM - System-wide selected-text Transforms

