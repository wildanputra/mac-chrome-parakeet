# --- v0.6 Meeting Recording Hardening ---

REQ-MEET-001:
  description: Meeting live mic processing captures raw mic audio by default while preserving paired mic/system frame alignment and retaining explicit VPIO plumbing
  version: v0.6
  status: implemented

REQ-MEET-002:
  description: Meeting stream joiner provides bounded-lag pairing with overflow diagnostics and sync observability for long sessions
  version: v0.6
  status: implemented

REQ-MEET-003:
  description: Meetings empty state includes one-line headphones guidance for cleaner speaker separation
  version: v0.6
  status: implemented

REQ-MEET-004:
  description: Meeting final artifact preserves dual-source separation as stereo when both mic and system tracks exist
  version: v0.6
  status: implemented

REQ-MEET-005:
  description: Interrupted or not-yet-transcribed meeting recordings are detected by lock file and recoverable on launch or later from Settings
  version: v0.6
  status: implemented

REQ-MEET-006:
  description: Meeting source audio is written as fragmented MP4 so crash-interrupted recordings remain playable up to the last fragment
  version: v0.6
  status: implemented

REQ-MEET-008:
  description: Meeting recording panel provides Notes, Transcript, and Ask tabs with Notes as default, plain tab labels, and a streaming-only Ask indicator
  version: v0.6
  status: implemented

REQ-MEET-009:
  description: User-authored meeting notes persist through crash recovery, final transcription metadata, notes.md sidecar export, LLM chat context, and custom prompt template substitution without shipping the reverted built-in memo-steered prompt
  version: v0.6
  status: implemented

REQ-MEET-010:
  description: Live meeting Ask quick prompts are user-customizable, persisted in quick_prompts, and exposed through the Ask Prompts sheet plus CLI import/export
  version: v0.6
  status: implemented

REQ-MEET-011:
  description: An in-flight meeting recording can be paused and resumed without ending the session; resumed audio appends gap-free into the same .m4a file and the persisted durationSeconds excludes paused time
  version: v0.6
  status: implemented

REQ-MEET-012:
  description: A finalized meeting's source audio file is reachable from the GUI via "Show in Finder" and "Save Audio As…" actions in both the Library Meetings list row context menu and the meeting detail-view action bar
  version: v0.6
  status: implemented

REQ-MEET-013:
  description: Meeting live-preview chunking can use Silero VAD speech boundaries for cached-model Parakeet sessions when AppFeatures.meetingVadLiveChunkingEnabled is true, while non-Parakeet, uncached-model, feature-off, and VAD-error paths fall back to the original fixed 5s / 1s chunker and final post-stop transcription remains unchanged
  version: v0.6
  status: implemented

REQ-MEET-014:
  description: An in-flight post-stop meeting transcription can be stopped from the Transcribe-tab tile and the floating pill menu, with a confirmation offering to keep the recorded audio (cancelled Library row plus recovery lock stay retryable) or delete the recording entirely (session folder, lock, and transcription rows removed)
  version: v0.6
  status: implemented

# --- v0.6 Multilingual Speech Recognition ---

REQ-STT-002:
  description: Nemotron Beta and WhisperKit are available as optional local speech recognition engines while Parakeet remains the default family; Parakeet exposes v3/v2 model selection without changing the local-first STT boundary; Nemotron dictation streams live partial text to the overlay and uses the streamed final transcript, falling back to recorded-file transcription when the live session cannot start, fails, drops samples, or finishes empty
  version: v0.6
  status: implemented

REQ-STT-003:
  description: GUI speech recognition settings persist the selected engine, Parakeet model variant, Nemotron language, and Whisper default language, and refuse unsafe switches while speech work or a meeting session is active
  version: v0.6
  status: implemented

REQ-TRANS-002:
  description: CLI file and URL transcription support per-invocation Parakeet, Nemotron, or Whisper engine selection, per-invocation Parakeet model overrides, persisted Parakeet/Nemotron/Whisper defaults via config/models, optional Nemotron/Whisper language hints, and additive detected-language output
  version: cli-2.5.0
  status: implemented

REQ-MEET-007:
  description: Meeting recordings capture the active speech engine and Nemotron/Whisper language at recording start for live preview, metadata, crash recovery, and final transcription
  version: v0.6
  status: implemented

