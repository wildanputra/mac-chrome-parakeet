# --- v0.6 Calendar Auto-Start (ADR-017) ---

REQ-CAL-001:
  description: Calendar auto-start monitors EventKit calendars via adaptive polling and, per a user-selected mode (off/notify/auto-start, default off and strictly opt-in), notifies of upcoming meetings and/or auto-starts meeting recording with a pre-meeting countdown; RSVP-declined and zero-duration events are excluded and the whole surface is gated by Calendar permission and AppFeatures.calendarEnabled. Calendar-driven auto-stop was removed (ADR-017 amendment, 2026-05) — recordings stop manually; activity-based auto-stop is a future ADR
  version: v0.6
  status: implemented

REQ-CAL-002:
  description: Calendar settings and first-use connection surfaces let users grant Calendar access, choose the auto-start mode and lead time, and include specific calendars; the Meetings workspace Upcoming section additionally lets users connect Calendar inline (request access when not determined, deep-link to System Settings when blocked) and exposes inline mode (off/reminders/auto-start) and event-filter controls plus an Upcoming preview that mirrors the auto-start candidate rules (calendar rows appear in Settings search only when enabled, and the CLI exposes upcoming calendar events for headless verification)
  version: v0.6
  status: implemented

# --- v0.6 Onboarding ---

REQ-ONB-001:
  description: Dictation-first 6-step onboarding (Welcome → Microphone → Accessibility → Hotkey → Speech Model → Ready); Meeting Recording and Calendar are opt-in, self-prompting on first use
  version: v0.6
  status: implemented

# --- v0.6 Batch Transcription & Completion Notification ---

REQ-TRANS-004:
  description: Local audio/video files can be transcribed in batch (multi-select file picker, folder selection, and multi-file drag-drop, recursively expanded and capped at 200 with the dropped count surfaced); the queue drains sequentially on the shared file-transcription path with no added parallelism, each result lands in the Library as it finishes, a failed file never aborts the batch, and Cancel all stops the run. YouTube transcription stays single-URL.
  version: v0.6
  status: implemented

REQ-UI-006:
  description: A file, media URL, podcast, or batch transcription completing plays a chime and, when MacParakeet is in the background, posts a notification banner; both are governed by one Settings toggle (default on) and the banner reuses the .alert-only authorization while the chime is delivered via SoundManager (backgrounded-safe, respects the system sound preference)
  version: v0.6
  status: implemented

# --- CLI Public Surface ---

REQ-CLI-001:
  description: CLI transcription telemetry emits a privacy-safe cli_operation event, honors explicit env/CI/UserDefaults opt-out controls, and exposes config get/set/list for the persisted telemetry preference
  version: cli-1.3.0
  status: implemented

REQ-CLI-002:
  description: CLI transcribe accepts multiple inputs (files, folders, podcast links, and media URLs supported by yt-dlp) and an --output-dir, writing one transcript file per input; single-input stdout behavior is preserved exactly, directories expand to their supported files, and the batch continues on per-file errors then exits non-zero with a summary if any failed
  version: cli-2.5.0
  status: implemented
