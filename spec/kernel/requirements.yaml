# MacParakeet Requirements
# Requirement IDs for traceability between specs, tests, and code.
# Format: REQ-{area}-{number}: {description}
#
# Areas:
#   DICT  - Dictation (system-wide voice input)
#   TRANS - File transcription
#   STT   - Speech-to-text engine
#   UI    - User interface
#   DATA  - Database and data model
#   PIPE  - Text processing pipeline
#   EXP   - Export formats
#   YT    - YouTube integration
#   DIAR  - Speaker diarization
#   LLM   - LLM provider integration
#   PLAY  - Video/audio playback
#   LIB   - Transcription library
#   MEET  - Meeting recording
#   CLI   - Public command-line surface

