# --- v0.6 Meeting Recording Hardening ---

REQ-MEET-001:
  description: Meeting live mic processing prefers macOS VPIO hardware AEC while preserving paired mic/system frame alignment
  version: v0.6
  status: implemented

REQ-MEET-002:
  description: Meeting stream joiner provides bounded-lag pairing with overflow diagnostics and sync observability for long sessions
  version: v0.6
  status: implemented

REQ-MEET-003:
  description: Meetings empty state includes one-line headphones guidance for cleaner speaker separation
  version: v0.6
  status: implemented

REQ-MEET-004:
  description: Meeting final artifact preserves dual-source separation as stereo when both mic and system tracks exist
  version: v0.6
  status: implemented

REQ-MEET-005:
  description: Interrupted or not-yet-transcribed meeting recordings are detected by lock file and recoverable on launch or later from Settings
  version: v0.6
  status: implemented

REQ-MEET-006:
  description: Meeting source audio is written as fragmented MP4 so crash-interrupted recordings remain playable up to the last fragment
  version: v0.6
  status: implemented

REQ-MEET-008:
  description: Meeting recording panel provides Notes, Transcript, and Ask tabs with Notes as default, plain tab labels, and a streaming-only Ask indicator
  version: v0.6
  status: implemented

REQ-MEET-009:
  description: User-authored meeting notes persist through crash recovery, final transcription metadata, notes.md sidecar export, LLM chat context, and custom prompt template substitution without shipping the reverted built-in memo-steered prompt
  version: v0.6
  status: implemented

REQ-MEET-010:
  description: Live meeting Ask quick prompts are user-customizable, persisted in quick_prompts, and exposed through the Ask Prompts sheet plus CLI import/export
  version: v0.6
  status: implemented

# --- v0.7 Multilingual Speech Recognition ---

REQ-STT-002:
  description: WhisperKit is available as a second speech recognition engine while Parakeet remains the default
  version: v0.7
  status: implemented

REQ-STT-003:
  description: GUI speech recognition settings persist the selected engine and Whisper default language, and refuse unsafe switches while speech work or a meeting session is active
  version: v0.7
  status: implemented

REQ-TRANS-002:
  description: CLI file and URL transcription support per-invocation Parakeet or Whisper engine selection, optional Whisper language hints, and additive detected-language output
  version: cli-1.3.0
  status: implemented

REQ-MEET-007:
  description: Meeting recordings capture the active speech engine and Whisper language at recording start for live preview, metadata, crash recovery, and final transcription
  version: v0.7
  status: implemented

# --- CLI Public Surface ---

REQ-CLI-001:
  description: CLI transcription telemetry emits a privacy-safe cli_operation event, honors explicit env/CI/UserDefaults opt-out controls, and exposes config get/set/list for the persisted telemetry preference
  version: cli-1.3.0
  status: implemented
